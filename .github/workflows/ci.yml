name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://payroll:payroll@localhost:5432/payroll?schema=public
  AUTH_SECRET: ci-only-secret-not-used-in-production
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & business-logic tests
        run: npm test

  build:
    name: Build & verify migrations
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payroll
          POSTGRES_PASSWORD: payroll
          POSTGRES_DB: payroll
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payroll"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply migrations against a clean database
        run: npx prisma migrate deploy

      - name: Seed database (smoke-tests business logic against real SQL)
        run: npx prisma db seed

      - name: Build
        run: npm run build
